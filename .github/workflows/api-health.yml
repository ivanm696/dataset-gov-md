name: API Health Check

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    name: Verify dataset.gov.md API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check API status endpoint
        run: |
          STATUS=$(curl -sf "https://dataset.gov.md/api/3/action/status_show")
          echo "Status response: $STATUS"
          echo "$STATUS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['success'], 'API returned success=false'
          ckan = d['result']['ckan_version']
          print(f'✅ CKAN version: {ckan}')
          "

      - name: Check dataset count
        run: |
          COUNT=$(curl -sf "https://dataset.gov.md/api/3/action/package_search?rows=0" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['result']['count'])")
          echo "Total datasets: $COUNT"
          python3 -c "
          count = $COUNT
          assert count > 1000, f'Dataset count too low: {count}'
          print(f'✅ Dataset count OK: {count}')
          "

      - name: Check search endpoint
        run: |
          curl -sf "https://dataset.gov.md/api/3/action/package_search?q=populatie&rows=1" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['success']
          assert d['result']['count'] > 0
          print('✅ Search endpoint OK')
          "

      - name: Summary
        if: always()
        run: |
          echo "## API Health Check 🇲🇩" >> $GITHUB_STEP_SUMMARY
          echo "**Portal:** https://dataset.gov.md" >> $GITHUB_STEP_SUMMARY
          echo "**API Base:** https://dataset.gov.md/api/3/action" >> $GITHUB_STEP_SUMMARY
          echo "**Checked:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
