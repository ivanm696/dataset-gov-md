name: API Health Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  health-check:
    name: Check dataset.gov.md API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check API status
        run: |
          echo "🔍 Checking dataset.gov.md CKAN API..."

          RESPONSE=$(curl -sf "https://dataset.gov.md/api/3/action/package_search?rows=0" \
            -H "Accept: application/json" \
            --max-time 15) || {
            echo "❌ API unreachable or returned error"
            exit 1
          }

          SUCCESS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success','false'))")
          COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['count'])" 2>/dev/null || echo "0")

          if [ "$SUCCESS" = "True" ] && [ "$COUNT" -gt "0" ]; then
            echo "✅ API is live — $COUNT datasets available"
          else
            echo "❌ API returned unexpected response"
            echo "$RESPONSE"
            exit 1
          fi

      - name: Check CKAN version
        run: |
          VERSION=$(curl -sf "https://dataset.gov.md/api/3/action/status_show" \
            -H "Accept: application/json" \
            --max-time 10 | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['ckan_version'])")
          echo "📦 CKAN version: $VERSION"

      - name: Update review.yml timestamp
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s/modified: '.*'/modified: '$TODAY'/" review.yml apis.yml
          echo "🕐 Updated modified date to $TODAY"

      - name: Commit timestamp update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: weekly API health check — $(date +%Y-%m-%d)"
          file_pattern: "review.yml apis.yml"
